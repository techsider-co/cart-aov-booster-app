# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "9ad0da4ae265db6263556801a8f60130"
application_url = "https://example.com"
embedded = true
name = "cart-aov-booster"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_themes — theme embed durumu (app/services/theme-check.server.ts)
scopes = "read_themes,write_products,write_metaobjects,write_metaobject_definitions"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[shop.metafields.aov_booster.shipping_bar_config]
type = "json"
name = "Shipping Bar Config"
description = "Free shipping bar widget configuration for Cart & AOV Booster"

  [shop.metafields.aov_booster.shipping_bar_config.access]
  admin = "merchant_read"
  storefront = "public_read"

[shop.metafields.aov_booster.sticky_cart_config]
type = "json"
name = "Sticky Cart Config"
description = "Sticky add-to-cart widget configuration for Cart & AOV Booster"

  [shop.metafields.aov_booster.sticky_cart_config.access]
  admin = "merchant_read"
  storefront = "public_read"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2026-07"

  # Handled by: app/routes/webhooks.app.uninstalled.tsx
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  # Handled by: app/routes/webhooks.app.scopes_update.tsx
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Handled by: app/routes/webhooks.app.subscriptions_update.tsx
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/subscriptions_update"
  topics = [ "app_subscriptions/update" ]

  # Mandatory compliance webhooks (App Store)
  # https://shopify.dev/docs/apps/build/compliance/privacy-law-compliance
  # Handled by: app/routes/webhooks.customers.data_request.tsx
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  # Handled by: app/routes/webhooks.customers.redact.tsx
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  # Handled by: app/routes/webhooks.shop.redact.tsx
  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
automatically_update_urls_on_dev = true
